name: Goal Service CI

on:
  push:
    paths:
      - 'services/goal-service/**'
      - 'services/shared/contracts/**'
  pull_request:
    paths:
      - 'services/goal-service/**'
      - 'services/shared/contracts/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync goal-service dependencies
        working-directory: services/goal-service
        run: |
          uv sync --dev

      - name: Run goal-service tests
        working-directory: services/goal-service
        run: |
          uv run pytest tests/ -q
