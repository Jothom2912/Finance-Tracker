name: All services CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  python-services:
    name: ${{ matrix.service }} - Python 3.11
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - gateway-service
          - user-service
          - transaction-service
          - budget-service
          - goal-service
          - ai-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    env:
      PYTHONPATH: ${{ github.workspace }}/services/shared/contracts:${{ github.workspace }}/services/shared:${{ github.workspace }}/services/${{ matrix.service }}:${{ github.workspace }}
      TESTING: "1"
      JWT_SECRET: test-secret
      INTERNAL_API_KEY: test-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install uv pytest pytest-asyncio ruff bandit

      - name: Install dependencies
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --dev
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No pyproject.toml or requirements.txt found"
            exit 1
          fi

      - name: Ruff lint
        run: |
          if [ -f pyproject.toml ]; then
            uv run ruff check .
          else
            ruff check .
          fi

      - name: Ruff format check
        run: |
          if [ -f pyproject.toml ]; then
            uv run ruff format --check .
          else
            ruff format --check .
          fi

      - name: Bandit security scan
        run: |
          if [ -d app ]; then
            bandit -r app -x tests || true
          fi

      - name: Run tests
        run: |
          if [ "${{ matrix.service }}" = "goal-service" ]; then
            if [ -f pyproject.toml ]; then
              uv run pytest tests -v -k "not adr_0003_goal_allocation_migration"
            else
              pytest tests -v -k "not adr_0003_goal_allocation_migration"
            fi
          else
            if [ -f pyproject.toml ]; then
              uv run pytest tests -v
            else
              pytest tests -v
            fi
          fi

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

  e2e-tests:
    name: E2E / System cooperation tests
    runs-on: ubuntu-latest
    needs:
      - python-services
      - frontend

    env:
      PYTHONPATH: ${{ github.workspace }}/services/shared/contracts:${{ github.workspace }}/services/shared:${{ github.workspace }}
      TESTING: "1"
      JWT_SECRET: test-secret
      INTERNAL_API_KEY: test-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install uv pytest pytest-asyncio requests httpx 
          pip install -r requirements.txt

      - name: Install root/backend dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Start system
        run: docker compose up -d --build

      - name: Wait for system
        run: sleep 30

      - name: Run E2E tests
        run: pytest tests/e2e -v

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop system
        if: always()
        run: docker compose down -v