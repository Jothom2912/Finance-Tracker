name: All services CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python-services:
    name: Test and scan Python services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - banking-service
          - gateway-service
          - user-service
          - transaction-service
          - categorization-service
          - budget-service
          - goal-service
          - ai-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest pytest-asyncio ruff bandit httpx testcontainers psycopg2-binary

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: bandit -r app -x tests

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/services/shared/contracts:${{ github.workspace }}/services/shared:${{ github.workspace }}/services/${{ matrix.service }}
          TESTING: '1'
          JWT_SECRET: test-secret-key
          DATABASE_URL: sqlite://
          USER_SERVICE_URL: http://mock-user-service:8001
          ACCOUNT_SERVICE_URL: http://mock-account-service:8004
          INTERNAL_API_KEY: test-api-key
          ENABLE_BANKING_APP_ID: test-app
          ENABLE_BANKING_KEY_PATH: dummy.pem
          ENABLE_BANKING_REDIRECT_URI: http://localhost/bank/callback
        run: pytest tests -v

  e2e:
    name: E2E cooperation smoke test
    runs-on: ubuntu-latest
    needs: python-services
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Start dependent services
        run: docker compose up -d --build --wait rabbitmq postgres-budget postgres-goals budget-service goal-service

      - name: Run E2E tests
        env:
          PYTHONPATH: ${{ github.workspace }}/services/shared/contracts:${{ github.workspace }}/services/shared
        run: pytest tests/e2e -v -m e2e

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop containers
        if: always()
        run: docker compose down -v
