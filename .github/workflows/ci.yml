name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: make -C services/monolith install-deps

      - name: Lint
        run: make -C services/monolith lint

      - name: Format check
        run: make -C services/monolith format-check

      - name: Run tests
        run: |
          cd services/monolith && uv run pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term
        env:
          ACTIVE_DB: mysql
          SECRET_KEY: test-secret-key-for-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./services/monolith/coverage.xml
          flags: backend
          name: codecov-umbrella
          fail_ci_if_error: false

  user-service:
    name: User Service (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: make -C services/user-service install-deps

      - name: Lint
        run: make -C services/user-service lint

      - name: Format check
        run: make -C services/user-service format-check

      - name: Run tests
        run: make -C services/user-service test

  transaction-service:
    name: Transaction Service (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: make -C services/transaction-service install-deps

      - name: Lint
        run: make -C services/transaction-service lint

      - name: Format check
        run: make -C services/transaction-service format-check

      - name: Run fast tests
        run: make -C services/transaction-service test

      # Testcontainers boots a real Postgres 16 to validate Alembic
      # migrations 005 + 006.  Kept as a separate step so the fast
      # suite's failure mode is visible independently and doesn't get
      # masked by a Docker/Testcontainers infrastructure issue.
      - name: Run Alembic migration tests (Testcontainers)
        run: make -C services/transaction-service test-migrations
