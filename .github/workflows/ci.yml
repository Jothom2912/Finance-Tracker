name: All services CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  python-services:
    name: ${{ matrix.service }} - Python 3.11
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - transaction-service
          - categorization-service
          - budget-service
          - goal-service
          - ai-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    env:
      PYTHONPATH: ${{ github.workspace }}/services/shared/contracts:${{ github.workspace }}/services/shared:${{ github.workspace }}/services/${{ matrix.service }}:${{ github.workspace }}
      TESTING: "1"
      JWT_SECRET: test-secret-key
      INTERNAL_API_KEY: test-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Ruff lint
        run: |
          uv run ruff check .

      - name: Ruff format check
        run: |
          uv run ruff format --check .

      - name: Bandit security scan
        run: |
          uv run pip install bandit
          uv run bandit -r app -x tests || true

      - name: Run tests
        run: |
          uv run pytest tests -v