apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: blackbox-exporter }
  template:
    metadata:
      labels: { app: blackbox-exporter }
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          args:
            - --config.file=/etc/blackbox_exporter/config.yml
          ports:
            - containerPort: 9115
          volumeMounts:
            - name: blackbox-config
              mountPath: /etc/blackbox_exporter/config.yml
              subPath: blackbox.yml
              readOnly: true
      volumes:
        - name: blackbox-config
          configMap:
            name: blackbox-config
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: finance-tracker
spec:
  selector: { app: blackbox-exporter }
  ports:
    - port: 9115
      targetPort: 9115
