apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: finance-tracker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: promtail
  namespace: finance-tracker
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: promtail
  namespace: finance-tracker
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: finance-tracker
roleRef:
  kind: Role
  name: promtail
  apiGroup: rbac.authorization.k8s.io
