apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-account
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-account }
  template:
    metadata:
      labels: { app: postgres-account }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: account_user
            - name: POSTGRES_PASSWORD
              value: account_password
            - name: POSTGRES_DB
              value: account_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-account-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-account-data
  namespace: finance-tracker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-account
  namespace: finance-tracker
spec:
  selector: { app: postgres-account }
  ports:
    - port: 5432
      targetPort: 5432
