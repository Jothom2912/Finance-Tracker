apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-budget
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-budget }
  template:
    metadata:
      labels: { app: postgres-budget }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: budget_service
            - name: POSTGRES_PASSWORD
              value: budget_service_pass
            - name: POSTGRES_DB
              value: budget_service
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-budget-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-budget-data
  namespace: finance-tracker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-budget
  namespace: finance-tracker
spec:
  selector: { app: postgres-budget }
  ports:
    - port: 5432
      targetPort: 5432
