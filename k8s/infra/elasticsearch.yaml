apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
          env:
            - name: discovery.type
              value: single-node
            # Lokal dev-cluster — ES indeholder kun projektioner der kan
            # genopbygges via backfill/events. Prod skal aktivere xpack
            # security + snapshots, se ADR-004.
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: es-data
          persistentVolumeClaim:
            claimName: es-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: es-data
  namespace: finance-tracker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: finance-tracker
spec:
  selector: { app: elasticsearch }
  ports:
    - name: http
      port: 9200
      targetPort: 9200
