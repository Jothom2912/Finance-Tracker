apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-saga
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-saga
  template:
    metadata:
      labels:
        app: postgres-saga
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: saga_service
            - name: POSTGRES_PASSWORD
              value: saga_service_pass
            - name: POSTGRES_DB
              value: saga
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-saga-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-saga-data
  namespace: finance-tracker
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-saga
  namespace: finance-tracker
spec:
  selector:
    app: postgres-saga
  ports:
    - port: 5432
      targetPort: 5432