apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service-consumer
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: account-service-consumer }
  template:
    metadata:
      labels: { app: account-service-consumer }
    spec:
      containers:
        - name: account-service-consumer
          image: finance-tracker/account-service:local
          imagePullPolicy: Never
          command: ["python", "-m", "app.consumers.worker"]
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_ACCOUNT_SYNC
