apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-start-consumer
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saga-start-consumer
  template:
    metadata:
      labels:
        app: saga-start-consumer
    spec:
      containers:
        - name: saga-start-consumer
          image: finance-tracker/saga-service:local
          imagePullPolicy: Never
          command: ["python", "-m", "app.workers.saga_start_consumer"]
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_SAGA