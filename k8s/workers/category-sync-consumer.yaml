apiVersion: apps/v1
kind: Deployment
metadata:
  name: category-sync-consumer
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: category-sync-consumer }
  template:
    metadata:
      labels: { app: category-sync-consumer }
    spec:
      containers:
        - name: category-sync-consumer
          image: finance-tracker/monolith:local
          imagePullPolicy: Never
          command: ["python", "-m", "backend.consumers.worker", "--consumer", "category-sync"]
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_MONOLITH
