apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-outbox-publisher
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: account-outbox-publisher }
  template:
    metadata:
      labels: { app: account-outbox-publisher }
    spec:
      containers:
        - name: account-outbox-publisher
          image: finance-tracker/account-service:local
          imagePullPolicy: Never
          command: ["python", "-m", "app.workers.outbox_publisher"]
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_ACCOUNT_ASYNC
