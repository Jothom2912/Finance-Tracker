apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: account-service }
  template:
    metadata:
      labels: { app: account-service }
    spec:
      containers:
        - name: account-service
          image: finance-tracker/account-service:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_ACCOUNT_SYNC
          ports:
            - containerPort: 8003
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: finance-tracker
spec:
  selector: { app: account-service }
  ports:
    - port: 8003
      targetPort: 8003
