apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: monolith }
  template:
    metadata:
      labels: { app: monolith }
    spec:
      containers:
        - name: monolith
          image: finance-tracker/monolith:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_MONOLITH
            - name: TRANSACTION_SERVICE_URL
              value: "http://transaction-service:8002"
            - name: BUDGET_SERVICE_URL
              value: "http://budget-service:8003"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: monolith
  namespace: finance-tracker
spec:
  selector: { app: monolith }
  ports:
    - port: 8000
      targetPort: 8000
