apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: transaction-service }
  template:
    metadata:
      labels: { app: transaction-service }
    spec:
      containers:
        - name: transaction-service
          image: finance-tracker/transaction-service:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_TRANSACTION
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: finance-tracker-secrets
                  key: DATABASE_URL_TRANSACTION_SYNC
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "700m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: finance-tracker
spec:
  selector: { app: transaction-service }
  ports:
    - port: 8002
      targetPort: 8002
