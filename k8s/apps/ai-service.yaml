apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: finance-tracker
spec:
  replicas: 1
  selector:
    matchLabels: { app: ai-service }
  template:
    metadata:
      labels: { app: ai-service }
    spec:
      containers:
        - name: ai-service
          image: finance-tracker/ai-service:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: finance-tracker-config
            - secretRef:
                name: finance-tracker-secrets
          ports:
            - containerPort: 8004
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: finance-tracker
spec:
  selector: { app: ai-service }
  ports:
    - port: 8004
      targetPort: 8004
