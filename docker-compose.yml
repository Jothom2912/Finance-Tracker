# ACTIVE_-prefixed vars (deliberately NOT plain ENABLE_BANKING_*, which .env
# defines for the legacy monolith) select which Enable Banking app compose
# runs with. Unset → sandbox defaults below. Set ENABLE_BANKING_ACTIVE_APP_ID
# + ENABLE_BANKING_ACTIVE_PEM_PATH in .env to run against production.
# The PEM should live OUTSIDE the repo; the default only eases first-time setup.
x-enable-banking-env: &enable-banking-env
  ENABLE_BANKING_APP_ID: ${ENABLE_BANKING_ACTIVE_APP_ID:-4fc48bf2-4d73-41e6-a76c-3fcce9ffe9a7}
  ENABLE_BANKING_KEY_PATH: /app/enablebanking.pem
  # Production apps only allow https redirect URLs — localhost is rejected.
  # Default works for sandbox; production uses a registered https URL and the
  # browser hop is rewritten to localhost manually (or via a tunnel).
  ENABLE_BANKING_REDIRECT_URI: ${ENABLE_BANKING_ACTIVE_REDIRECT_URI:-http://localhost:8009/api/v1/bank/callback}

x-enable-banking-volumes: &enable-banking-volumes
  - ${ENABLE_BANKING_ACTIVE_PEM_PATH:-./enablebanking-sandbox.pem}:/app/enablebanking.pem:ro

# P2-16: fælles healthcheck-timings for API-services. Flere services kører
# `alembic upgrade head` i entrypoint før uvicorn starter, så start_period
# er bevidst rummelig — service_healthy-gating må ikke flappe på cold start.
# Images er python-slim (ingen curl/wget), så proben bruger stdlib urllib.
x-api-healthcheck-defaults: &api-healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 45s

services:
  # === Infrastructure ===

  # mysql: REMOVED — no service reads from finans_tracker projections after
  #   monolith + sync consumers were removed. Data in mysql_data volume is
  #   preserved until the volume is explicitly deleted (docker volume rm).

  # redis: intet volume med vilje — cache-only efter P2-12, indhold kan
  # altid genopbygges. Tilføj kun volume hvis redis får persistent state.
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    environment:
      discovery.type: single-node
      # Dev only — ES indeholder kun projektioner der kan genopbygges via
      # backfill/events. Prod (k8s) skal aktivere xpack + snapshots, se ADR-004.
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    mem_limit: 1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen3:4b && ollama pull bge-m3"]
    restart: "no"

  # === Application services ===

  # monolith: REMOVED — gateway-service (port 8010) serves all read queries.
  #   Frontend cut over in 9b9ca782. Zero DEPRECATED warnings confirmed.
  #   Auth already independent (LoginPage/RegisterPage use user-service directly).

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:user_service_pass@postgres:5432/users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRE_MINUTES: "60"
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-goals:
    image: postgres:16
    environment:
      POSTGRES_USER: goal_service
      POSTGRES_PASSWORD: goal_service_pass
      POSTGRES_DB: goals
    ports:
      - "5438:5432"
    volumes:
      - postgres_goals_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goal_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  goal-service:
    build:
      context: .
      dockerfile: services/goal-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8006/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://goal_service:goal_service_pass@postgres-goals:5432/goals
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      ACCOUNT_SERVICE_URL: http://account-service:8003
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENVIRONMENT: development
    depends_on:
      postgres-goals:
        condition: service_healthy
      user-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  goal-outbox-worker:
    build:
      context: .
      dockerfile: services/goal-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://goal_service:goal_service_pass@postgres-goals:5432/goals
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      goal-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  goal-budget-consumer:
    build:
      context: .
      dockerfile: services/goal-service/Dockerfile
    command: ["python", "-m", "app.workers.budget_month_closed_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://goal_service:goal_service_pass@postgres-goals:5432/goals
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      goal-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-outbox-worker:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:user_service_pass@postgres:5432/users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      user-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # user-sync-consumer: REMOVED — wrote to MySQL User projection, no readers remain.
  # category-sync-consumer: REMOVED — wrote to MySQL Category projection, no readers remain.
  # transaction-sync-consumer: REMOVED — wrote to MySQL Transaction projection, no readers remain.
  #   (account 1's 247 bulk-imported txs never reached this consumer — confirmed stale.)
  # account-sync-consumer: REMOVED — wrote to MySQL Account projection, no readers remain.
  # account-creation-consumer: REMOVED earlier — replaced by account-service-consumer (Phase 5).

  postgres-transactions:
    image: postgres:16
    environment:
      POSTGRES_USER: transaction_service
      POSTGRES_PASSWORD: transaction_service_pass
      POSTGRES_DB: transactions
    ports:
      - "5434:5432"
    volumes:
      - postgres_transactions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
      CATEGORIZATION_SERVICE_URL: http://categorization-service:8005
      CATEGORIZATION_TIMEOUT_S: "0.5"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+psycopg2://account_user:account_password@postgres-account:5432/account_db
      JWT_SECRET: dev-secret-key-change-in-production
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      USER_SERVICE_URL: http://user-service:8001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-account:
        condition: service_healthy
      user-service:
        condition: service_healthy

  postgres-account:
    image: postgres:16
    environment:
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
      POSTGRES_DB: account_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_account_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  account-outbox-publisher:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    # P2-16: manglede restart-policy — et crash stoppede account-event-levering
    # i stilhed. on-failure matcher søster-workerne (outbox-workers).
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://account_user:account_password@postgres-account:5432/account_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres-account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  account-service-consumer:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    command: ["python", "-m", "app.consumers.worker"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://account_user:account_password@postgres-account:5432/account_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
    depends_on:
      postgres-account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy

  transaction-outbox-worker:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  transaction-categorized-consumer:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.categorized_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_healthy
      categorization-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  transaction-taxonomy-consumer:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.taxonomy_sync_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_healthy
      categorization-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  transaction-saga-command-consumer:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_command_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-categorization:
    image: postgres:16
    environment:
      POSTGRES_USER: categorization_service
      POSTGRES_PASSWORD: categorization_service_pass
      POSTGRES_DB: categorization
    ports:
      - "5435:5432"
    volumes:
      - postgres_categorization_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U categorization_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  categorization-service:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      postgres-categorization:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  categorization-outbox-worker:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  categorization-transaction-consumer:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    command: ["python", "-m", "app.workers.transaction_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  categorization-correction-consumer:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    command: ["python", "-m", "app.workers.category_corrected_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8007:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      # ai-service skal bruge compose-ollama (som ollama-pull fylder med
      # qwen3:4b + bge-m3) — ikke en evt. Ollama på host-maskinen (P2-16 drift).
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      BUDGET_SERVICE_URL: http://budget-service:8003
      RETRIEVAL_TOP_K: "10"
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      analytics-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy

  # === Placeholder services (uncomment as services are ready) ===

  postgres-budget:
    image: postgres:16
    environment:
      POSTGRES_USER: budget_service
      POSTGRES_PASSWORD: budget_service_pass
      POSTGRES_DB: budget_service
    ports:
      - "5437:5432"
    volumes:
      - postgres_budget_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  budget-service:
    build:
      context: .
      dockerfile: services/budget-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://budget_service:budget_service_pass@postgres-budget:5432/budget_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
      CATEGORY_SERVICE_URL: http://categorization-service:8005
      TRANSACTION_SERVICE_URL: http://transaction-service:8002
    depends_on:
      postgres-budget:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  budget-outbox-worker:
    build:
      context: .
      dockerfile: services/budget-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://budget_service:budget_service_pass@postgres-budget:5432/budget_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CATEGORY_SERVICE_URL: http://categorization-service:8005
      TRANSACTION_SERVICE_URL: http://transaction-service:8002
      ENVIRONMENT: development
    depends_on:
      budget-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # F1-07: day-7 auto-close af aabne fortidsmaaneder → surplus→goal-allokering.
  # OBS ved deploy mod en DB med historik: foerste tick lukker ALLE aabne
  # fortidsmaaneder (by design). Single replica — se scheduler-pattern-decision.
  budget-month-close-scheduler:
    build:
      context: .
      dockerfile: services/budget-service/Dockerfile
    command: ["python", "-m", "app.workers.month_close_scheduler"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://budget_service:budget_service_pass@postgres-budget:5432/budget_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CATEGORY_SERVICE_URL: http://categorization-service:8005
      TRANSACTION_SERVICE_URL: http://transaction-service:8002
      ENVIRONMENT: development
      MONTH_CLOSE_INTERVAL_SECONDS: "3600"
      MONTH_CLOSE_DAY: "7"
    depends_on:
      budget-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-banking:
    image: postgres:16
    environment:
      POSTGRES_USER: banking_service
      POSTGRES_PASSWORD: banking_service_pass
      POSTGRES_DB: banking_db
    ports:
      - "5439:5432"
    volumes:
      - postgres_banking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  banking-service:
    build:
      context: .
      dockerfile: services/banking-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8009/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://banking_service:banking_service_pass@postgres-banking:5432/banking_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
      ACCOUNT_SERVICE_URL: http://account-service:8003
      <<: *enable-banking-env
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes: *enable-banking-volumes
    depends_on:
      postgres-banking:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      account-service:
        condition: service_healthy

  banking-outbox-worker:
    build:
      context: .
      dockerfile: services/banking-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://banking_service:banking_service_pass@postgres-banking:5432/banking_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      banking-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  banking-account-projection-consumer:
    build:
      context: .
      dockerfile: services/banking-service/Dockerfile
    command: ["python", "-m", "app.consumers.account_projection_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://banking_service:banking_service_pass@postgres-banking:5432/banking_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      banking-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      account-outbox-publisher:
        condition: service_started

  banking-saga-command-consumer:
    build:
      context: .
      dockerfile: services/banking-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_command_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://banking_service:banking_service_pass@postgres-banking:5432/banking_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      <<: *enable-banking-env
      ENVIRONMENT: development
    depends_on:
      banking-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes: *enable-banking-volumes

  # F1-05: nightly auto-sync — starter en sync-saga per aktiv forbindelse
  # naar sidste sync er >SYNC_EVERY_HOURS gammel. Foerste tick efter deploy
  # sweeper ALLE stale forbindelser (sekventielt). Single replica; races
  # mod manuel sync er ufarlige via P3-14-claimet.
  banking-sync-scheduler:
    build:
      context: .
      dockerfile: services/banking-service/Dockerfile
    command: ["python", "-m", "app.workers.sync_scheduler"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://banking_service:banking_service_pass@postgres-banking:5432/banking_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      <<: *enable-banking-env
      ENVIRONMENT: development
      ACCOUNT_SERVICE_URL: http://account-service:8003
      SYNC_SCHEDULER_INTERVAL_SECONDS: "3600"
      SYNC_EVERY_HOURS: "24"
      SYNC_CONSENT_WARN_DAYS: "7"
    depends_on:
      banking-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes: *enable-banking-volumes

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8010/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      CATEGORIZATION_SERVICE_URL: http://categorization-service:8005
      ACCOUNT_SERVICE_URL: http://account-service:8003
      BUDGET_SERVICE_URL: http://budget-service:8003
      SAGA_SERVICE_URL: http://saga-service:8011
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
      saga-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8012:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      elasticsearch:
        condition: service_healthy

  analytics-projection-consumer:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    command: ["python", "-m", "app.workers.projection_consumer"]
    restart: on-failure
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # AI-20: skriver description_vector via Ollama (bge-m3) på egen kø —
  # Ollama-nedetid rammer aldrig kerneprojektionerne ovenfor.
  analytics-embedding-consumer:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    command: ["python", "-m", "app.workers.embedding_consumer"]
    restart: on-failure
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      ENVIRONMENT: development
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  # notification-service:
  #   build: ./services/notification-service
  #   ports:
  #     - "8008:8008"
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy

  # ── Saga Service ─────────────────────────────────────────────────

  postgres-saga:
    image: postgres:16
    environment:
      POSTGRES_USER: saga_service
      POSTGRES_PASSWORD: saga_service_pass
      POSTGRES_DB: saga
    ports:
      - "5440:5432"
    volumes:
      - postgres_saga_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  saga-service:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8011/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENVIRONMENT: development
      SAGA_TIMEOUT_SECONDS: 300
    depends_on:
      postgres-saga:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  saga-outbox-worker:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  saga-reply-consumer:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_reply_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  saga-start-consumer:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_start_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  saga-timeout-worker:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_timeout_worker"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
      SAGA_TIMEOUT_SECONDS: 300
      TIMEOUT_CHECK_INTERVAL_SECONDS: 30
    depends_on:
      saga-service:
        condition: service_healthy

  # === Notification service (F1-01) ===

  postgres-notifications:
    image: postgres:16
    environment:
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service_pass
      POSTGRES_DB: notifications
    ports:
      - "5439:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8008/health', timeout=3).status==200 else 1)"]
      <<: *api-healthcheck-defaults
    environment:
      DATABASE_URL: postgresql+asyncpg://notification_service:notification_service_pass@postgres-notifications:5432/notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ACCOUNT_SERVICE_URL: http://account-service:8003
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENVIRONMENT: development
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-consumer:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    command: ["python", "-m", "app.workers.notification_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://notification_service:notification_service_pass@postgres-notifications:5432/notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ACCOUNT_SERVICE_URL: http://account-service:8003
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      notification-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  # mysql_data: preserved but unused — delete with: docker volume rm finance-tracker_mysql_data
  postgres_data:
  postgres_goals_data:
  postgres_transactions_data:
