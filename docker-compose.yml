services:
  # === Infrastructure ===

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finans_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # === Application services ===

  monolith:
    build:
      context: .
      dockerfile: services/monolith/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      SECRET_KEY: dev-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
      TRANSACTION_SERVICE_URL: http://transaction-service:8002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENABLE_BANKING_APP_ID: ${ENABLE_BANKING_APP_ID}
      ENABLE_BANKING_KEY_PATH: /app/enablebanking-privat.pem
      ENABLE_BANKING_REDIRECT_URI: ${ENABLE_BANKING_REDIRECT_URI:-http://localhost:8000/api/v1/bank/callback}
      ENABLE_BANKING_ENVIRONMENT: ${ENABLE_BANKING_ENVIRONMENT:-production}
    volumes:
      - ./enablebanking-privat.pem:/app/enablebanking-privat.pem:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      transaction-service:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:user_service_pass@postgres:5432/users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-goals:
    image: postgres:16
    environment:
      POSTGRES_USER: goal_service
      POSTGRES_PASSWORD: goal_service_pass
      POSTGRES_DB: goals
    ports:
      - "5438:5432"
    volumes:
      - postgres_goals_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goal_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  goal-service:
    build:
      context: .
      dockerfile: services/goal-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://goal_service:goal_service_pass@postgres-goals:5432/goals
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      postgres-goals:
        condition: service_healthy
      user-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  goal-outbox-worker:
    build:
      context: .
      dockerfile: services/goal-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://goal_service:goal_service_pass@postgres-goals:5432/goals
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      INTERNAL_API_KEY: dev-internal-api-key-change-in-production
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      goal-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  user-outbox-worker:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://user_service:user_service_pass@postgres:5432/users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      user-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  user-sync-consumer:
    build:
      context: .
      dockerfile: services/monolith/Dockerfile
    command: ["python", "-m", "backend.consumers.worker", "--consumer", "user-sync"]
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      SECRET_KEY: dev-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  account-creation-consumer:
    build:
      context: .
      dockerfile: services/monolith/Dockerfile
    command: ["python", "-m", "backend.consumers.worker", "--consumer", "account-creation"]
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      SECRET_KEY: dev-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  category-sync-consumer:
    build:
      context: .
      dockerfile: services/monolith/Dockerfile
    command: ["python", "-m", "backend.consumers.worker", "--consumer", "category-sync"]
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      SECRET_KEY: dev-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  transaction-sync-consumer:
    build:
      context: .
      dockerfile: services/monolith/Dockerfile
    command: ["python", "-m", "backend.consumers.worker", "--consumer", "transaction-sync"]
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      SECRET_KEY: dev-secret-key-change-in-production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-transactions:
    image: postgres:16
    environment:
      POSTGRES_USER: transaction_service
      POSTGRES_PASSWORD: transaction_service_pass
      POSTGRES_DB: transactions
    ports:
      - "5434:5432"
    volumes:
      - postgres_transactions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
      CATEGORIZATION_SERVICE_URL: http://categorization-service:8005
      CATEGORIZATION_TIMEOUT_S: "0.5"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finans_tracker
      JWT_SECRET: dev-secret-key-change-in-production
      USER_SERVICE_URL: http://user-service:8001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      - mysql
      - user-service

  transaction-outbox-worker:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  transaction-categorized-consumer:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    command: ["python", "-m", "app.workers.categorized_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://transaction_service:transaction_service_pass@postgres-transactions:5432/transactions
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      transaction-service:
        condition: service_started
      categorization-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  postgres-categorization:
    image: postgres:16
    environment:
      POSTGRES_USER: categorization_service
      POSTGRES_PASSWORD: categorization_service_pass
      POSTGRES_DB: categorization
    ports:
      - "5435:5432"
    volumes:
      - postgres_categorization_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U categorization_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  categorization-service:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      ENVIRONMENT: development
    depends_on:
      postgres-categorization:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  categorization-outbox-worker:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  categorization-category-sync:
    build:
      context: .
      dockerfile: services/categorization-service/Dockerfile
    command: ["python", "-m", "app.workers.category_sync_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://categorization_service:categorization_service_pass@postgres-categorization:5432/categorization
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      categorization-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # === Placeholder services (uncomment as services are ready) ===

  # budget-service:
  #   build: ./services/budget-service
