  postgres_data:
  postgres_goals_data:
  postgres_transactions_data:
  postgres_account_data:
  postgres_categorization_data:
  postgres_budget_data:
  rabbitmq_data:
  ollama_models:
  ai_chromadb_data:
  postgres_banking_data:
  postgres_saga_data:
