  # ── Saga Service ─────────────────────────────────────────────────

  postgres-saga:
    image: postgres:16
    environment:
      POSTGRES_USER: saga_service
      POSTGRES_PASSWORD: saga_service_pass
      POSTGRES_DB: saga
    ports:
      - "5440:5432"
    volumes:
      - postgres_saga_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  saga-service:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENVIRONMENT: development
      SAGA_TIMEOUT_SECONDS: 300
    depends_on:
      postgres-saga:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  saga-outbox-worker:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.outbox_publisher"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  saga-reply-consumer:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_reply_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  saga-start-consumer:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_start_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    depends_on:
      saga-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  saga-timeout-worker:
    build:
      context: .
      dockerfile: services/saga-service/Dockerfile
    command: ["python", "-m", "app.workers.saga_timeout_worker"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://saga_service:saga_service_pass@postgres-saga:5432/saga
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
      SAGA_TIMEOUT_SECONDS: 300
      TIMEOUT_CHECK_INTERVAL_SECONDS: 30
    depends_on:
      saga-service:
        condition: service_started

volumes:
