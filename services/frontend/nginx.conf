server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes
    # (e.g. /dashboard, /login, /bank/callback) so React Router can handle them
    # on full page loads / OAuth redirects instead of nginx returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
