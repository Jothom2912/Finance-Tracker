asyncapi: "2.6.0"

info:
  title: Finance Tracker AsyncAPI
  version: "1.0.0"
  description: >
    AsyncAPI documentation for Finance Tracker message-based communication.
    The system uses RabbitMQ for asynchronous communication between backend
    microservices. REST and GraphQL document synchronous APIs, while this file
    documents event-driven communication, queues, routing keys, producers,
    consumers and payload formats.

defaultContentType: application/json

servers:
  rabbitmq:
    url: rabbitmq:5672
    protocol: amqp
    description: RabbitMQ broker running in Docker Compose and Kubernetes.

channels:
  user.created:
    description: Published when a new user is created.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: user-service publishes UserCreatedEvent.
      message:
        $ref: "#/components/messages/UserCreated"
      x-producer: user-service
      x-consumers:
        - service: account-service
          queue: account_service.account_creation

  account.created:
    description: Published when an account is created.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: account-service publishes AccountCreatedEvent.
      message:
        $ref: "#/components/messages/AccountCreated"
      x-producer: account-service
      x-consumers:
        - service: banking-service
          queue: banking.account_sync
        - service: analytics-service
          queue: analytics.accounts

  account.updated:
    description: Published when an account is updated.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: account-service publishes AccountUpdatedEvent.
      message:
        $ref: "#/components/messages/AccountUpdated"
      x-producer: account-service
      x-consumers:
        - service: banking-service
          queue: banking.account_sync
        - service: analytics-service
          queue: analytics.accounts

  category.created:
    description: Published when a category is created (v2, full state incl. display_order).
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes CategoryCreatedEvent.
      message:
        $ref: "#/components/messages/CategoryCreated"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  category.updated:
    description: Published when a category is updated (v2, full state; previous_* dropped).
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes CategoryUpdatedEvent.
      message:
        $ref: "#/components/messages/CategoryUpdated"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  category.deleted:
    description: Published when a category is deleted (v2, full final state).
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes CategoryDeletedEvent.
      message:
        $ref: "#/components/messages/CategoryDeleted"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  subcategory.created:
    description: >-
      Published when a subcategory is created. Note: a topic binding on
      `category.*` does NOT match `subcategory.*` — consumers bind both.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes SubCategoryCreatedEvent.
      message:
        $ref: "#/components/messages/SubCategoryCreated"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  subcategory.updated:
    description: Published when a subcategory is updated (full state).
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes SubCategoryUpdatedEvent.
      message:
        $ref: "#/components/messages/SubCategoryUpdated"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  subcategory.deleted:
    description: Published when a subcategory is deleted (full final state).
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes SubCategoryDeletedEvent.
      message:
        $ref: "#/components/messages/SubCategoryDeleted"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.taxonomy_sync
        - service: analytics-service
          queue: analytics.taxonomy

  transaction.created:
    description: Published when a transaction is created.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: transaction-service publishes TransactionCreatedEvent.
      message:
        $ref: "#/components/messages/TransactionCreated"
      x-producer: transaction-service
      x-consumers:
        - service: categorization-service
          queue: categorization.transaction_created
        - service: analytics-service
          queue: analytics.transactions

  transaction.updated:
    description: Published when a transaction is updated.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: transaction-service publishes TransactionUpdatedEvent.
      message:
        $ref: "#/components/messages/TransactionUpdated"
      x-producer: transaction-service
      x-consumers:
        - service: analytics-service
          queue: analytics.transactions

  transaction.deleted:
    description: Published when a transaction is deleted or soft-deleted.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: transaction-service publishes TransactionDeletedEvent.
      message:
        $ref: "#/components/messages/TransactionDeleted"
      x-producer: transaction-service
      x-consumers:
        - service: analytics-service
          queue: analytics.transactions

  transaction.categorized:
    description: Published when categorization-service has categorized a transaction.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: categorization-service publishes TransactionCategorizedEvent.
      message:
        $ref: "#/components/messages/TransactionCategorized"
      x-producer: categorization-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.transaction_categorized
        - service: analytics-service
          queue: analytics.transactions

  budget.month_closed:
    description: Published when a budget month is closed.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: budget-service publishes BudgetMonthClosedEvent.
      message:
        $ref: "#/components/messages/BudgetMonthClosed"
      x-producer: budget-service
      x-consumers:
        - service: goal-service
          queue: goal_service.budget_month_closed

  goal.created:
    description: Published when a goal is created.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: goal-service publishes GoalCreatedEvent.
      message:
        $ref: "#/components/messages/GoalCreated"
      x-producer: goal-service
      x-consumers:
        - service: analytics-service
          queue: analytics.goals

  goal.updated:
    description: Published when a goal is updated.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: goal-service publishes GoalUpdatedEvent.
      message:
        $ref: "#/components/messages/GoalUpdated"
      x-producer: goal-service
      x-consumers:
        - service: analytics-service
          queue: analytics.goals

  goal.deleted:
    description: Published when a goal is deleted.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: goal-service publishes GoalDeletedEvent.
      message:
        $ref: "#/components/messages/GoalDeleted"
      x-producer: goal-service
      x-consumers:
        - service: analytics-service
          queue: analytics.goals

  bank.connection.created:
    description: Published when a bank connection is created.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: banking-service publishes BankConnectionCreatedEvent.
      message:
        $ref: "#/components/messages/BankConnectionCreated"
      x-producer: banking-service

  bank.connection.disconnected:
    description: Published when a bank connection is disconnected.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: banking-service publishes BankConnectionDisconnectedEvent.
      message:
        $ref: "#/components/messages/BankConnectionDisconnected"
      x-producer: banking-service

  bank.sync.completed:
    description: Published when a bank sync has completed.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: banking-service publishes BankSyncCompletedEvent.
      message:
        $ref: "#/components/messages/BankSyncCompleted"
      x-producer: banking-service

  saga.bank_sync.start:
    description: Published by banking-service to start the bank sync saga.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: banking-service publishes BankSyncSagaStartEvent.
      message:
        $ref: "#/components/messages/BankSyncSagaStart"
      x-producer: banking-service
      x-consumers:
        - service: saga-service
          queue: saga_service.saga_start

  saga.cmd.bank_fetch_transactions:
    description: Saga command asking banking-service to fetch transactions from the bank API.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: saga-service publishes BankFetchTransactionsCommand.
      message:
        $ref: "#/components/messages/BankFetchTransactionsCommand"
      x-producer: saga-service
      x-consumers:
        - service: banking-service
          queue: banking_service.saga_commands

  saga.cmd.bulk_import_transactions:
    description: Saga command asking transaction-service to bulk import fetched transactions.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: saga-service publishes BulkImportTransactionsCommand.
      message:
        $ref: "#/components/messages/BulkImportTransactionsCommand"
      x-producer: saga-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.saga_commands

  saga.cmd.rollback_import:
    description: Compensation command asking transaction-service to rollback imported transactions.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: saga-service publishes RollbackImportCommand.
      message:
        $ref: "#/components/messages/RollbackImportCommand"
      x-producer: saga-service
      x-consumers:
        - service: transaction-service
          queue: transaction_service.saga_commands

  saga.cmd.mark_sync_complete:
    description: Saga command asking banking-service to mark the sync as completed.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: saga-service publishes MarkSyncCompleteCommand.
      message:
        $ref: "#/components/messages/MarkSyncCompleteCommand"
      x-producer: saga-service
      x-consumers:
        - service: banking-service
          queue: banking_service.saga_commands

  saga.reply.#:
    description: Replies from banking-service and transaction-service back to saga-service.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: banking-service and transaction-service publish SagaReply messages.
      message:
        $ref: "#/components/messages/SagaReply"
      x-producers:
        - banking-service
        - transaction-service
      x-consumers:
        - service: saga-service
          queue: saga_service.saga_reply

  saga.bank_sync.completed:
    description: Published when the bank sync saga has completed successfully.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: finans_tracker.events
          type: topic
          durable: true
    publish:
      summary: saga-service publishes BankSyncSagaCompletedEvent.
      message:
        $ref: "#/components/messages/BankSyncSagaCompleted"
      x-producer: saga-service

  serverless.health.requests:
    description: Direct RabbitMQ queue used by KEDA ScaledJob for serverless health checks.
    bindings:
      amqp:
        is: queue
        queue:
          name: serverless.health.requests
          durable: true
    publish:
      summary: serverless-health-publish job publishes health check requests.
      message:
        $ref: "#/components/messages/HealthReportRequested"
      x-producer: serverless-health-publish-job
      x-consumers:
        - service: serverless-health-job
          queue: serverless.health.requests
          scaledBy: KEDA ScaledJob

components:
  messages:
    UserCreated:
      name: UserCreatedEvent
      payload:
        $ref: "#/components/schemas/UserCreatedEvent"

    AccountCreated:
      name: AccountCreatedEvent
      payload:
        $ref: "#/components/schemas/AccountCreatedEvent"

    AccountUpdated:
      name: AccountUpdatedEvent
      payload:
        $ref: "#/components/schemas/AccountUpdatedEvent"

    CategoryCreated:
      name: CategoryCreatedEvent
      payload:
        $ref: "#/components/schemas/CategoryCreatedEvent"

    CategoryUpdated:
      name: CategoryUpdatedEvent
      payload:
        $ref: "#/components/schemas/CategoryUpdatedEvent"

    CategoryDeleted:
      name: CategoryDeletedEvent
      payload:
        $ref: "#/components/schemas/CategoryDeletedEvent"

    SubCategoryCreated:
      name: SubCategoryCreatedEvent
      payload:
        $ref: "#/components/schemas/SubCategoryCreatedEvent"

    SubCategoryUpdated:
      name: SubCategoryUpdatedEvent
      payload:
        $ref: "#/components/schemas/SubCategoryUpdatedEvent"

    SubCategoryDeleted:
      name: SubCategoryDeletedEvent
      payload:
        $ref: "#/components/schemas/SubCategoryDeletedEvent"

    TransactionCreated:
      name: TransactionCreatedEvent
      payload:
        $ref: "#/components/schemas/TransactionCreatedEvent"

    TransactionUpdated:
      name: TransactionUpdatedEvent
      payload:
        $ref: "#/components/schemas/TransactionUpdatedEvent"

    TransactionDeleted:
      name: TransactionDeletedEvent
      payload:
        $ref: "#/components/schemas/TransactionDeletedEvent"

    TransactionCategorized:
      name: TransactionCategorizedEvent
      payload:
        $ref: "#/components/schemas/TransactionCategorizedEvent"

    BudgetMonthClosed:
      name: BudgetMonthClosedEvent
      payload:
        $ref: "#/components/schemas/BudgetMonthClosedEvent"

    GoalCreated:
      name: GoalCreatedEvent
      payload:
        $ref: "#/components/schemas/GoalCreatedEvent"

    GoalUpdated:
      name: GoalUpdatedEvent
      payload:
        $ref: "#/components/schemas/GoalUpdatedEvent"

    GoalDeleted:
      name: GoalDeletedEvent
      payload:
        $ref: "#/components/schemas/GoalDeletedEvent"

    BankConnectionCreated:
      name: BankConnectionCreatedEvent
      payload:
        $ref: "#/components/schemas/BankConnectionCreatedEvent"

    BankConnectionDisconnected:
      name: BankConnectionDisconnectedEvent
      payload:
        $ref: "#/components/schemas/BankConnectionDisconnectedEvent"

    BankSyncCompleted:
      name: BankSyncCompletedEvent
      payload:
        $ref: "#/components/schemas/BankSyncCompletedEvent"

    BankSyncSagaStart:
      name: BankSyncSagaStartEvent
      payload:
        $ref: "#/components/schemas/BankSyncSagaStartEvent"

    BankFetchTransactionsCommand:
      name: BankFetchTransactionsCommand
      payload:
        $ref: "#/components/schemas/BankFetchTransactionsCommand"

    BulkImportTransactionsCommand:
      name: BulkImportTransactionsCommand
      payload:
        $ref: "#/components/schemas/BulkImportTransactionsCommand"

    RollbackImportCommand:
      name: RollbackImportCommand
      payload:
        $ref: "#/components/schemas/RollbackImportCommand"

    MarkSyncCompleteCommand:
      name: MarkSyncCompleteCommand
      payload:
        $ref: "#/components/schemas/MarkSyncCompleteCommand"

    SagaReply:
      name: SagaReply
      payload:
        $ref: "#/components/schemas/SagaReply"

    BankSyncSagaCompleted:
      name: BankSyncSagaCompletedEvent
      payload:
        $ref: "#/components/schemas/BankSyncSagaCompletedEvent"

    HealthReportRequested:
      name: HealthReportRequested
      payload:
        $ref: "#/components/schemas/HealthReportRequested"

  schemas:
    BaseEvent:
      type: object
      required:
        - event_type
        - event_version
        - correlation_id
        - timestamp
      properties:
        event_type:
          type: string
          description: Routing key and logical event type.
        event_version:
          type: integer
          example: 1
        correlation_id:
          type: string
          format: uuid
          description: Used to trace events across services.
        timestamp:
          type: string
          format: date-time
          description: UTC event creation time.

    UserCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - user_id
            - email
            - username
          properties:
            user_id:
              type: integer
              example: 42
            email:
              type: string
              example: alice@example.com
            username:
              type: string
              example: alice

    AccountCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - account_id
            - user_id
            - account_name
          properties:
            account_id:
              type: integer
              example: 1001
            user_id:
              type: integer
              example: 42
            account_name:
              type: string
              example: Main account
            saldo:
              type: string
              example: "0.00"
            budget_start_day:
              type: integer
              example: 1

    AccountUpdatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - account_id
            - user_id
            - name
            - saldo
            - budget_start_day
          properties:
            account_id:
              type: integer
              example: 1001
            user_id:
              type: integer
              example: 42
            name:
              type: string
              example: Updated account
            saldo:
              type: string
              example: "1250.50"
            budget_start_day:
              type: integer
              example: 1

    CategoryCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - category_id
            - name
            - category_type
          properties:
            category_id:
              type: integer
              example: 10
            name:
              type: string
              example: Groceries
            category_type:
              type: string
              example: expense
            display_order:
              type: integer
              default: 0
              example: 1

    CategoryUpdatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - category_id
            - name
            - category_type
          properties:
            category_id:
              type: integer
              example: 10
            name:
              type: string
              example: Food
            category_type:
              type: string
              example: expense
            display_order:
              type: integer
              default: 0
              example: 1

    CategoryDeletedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - category_id
            - name
            - category_type
          properties:
            category_id:
              type: integer
              example: 10
            name:
              type: string
              example: Groceries
            category_type:
              type: string
              example: expense
            display_order:
              type: integer
              default: 0
              example: 1

    SubCategoryCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - subcategory_id
            - name
            - category_id
          properties:
            subcategory_id:
              type: integer
              example: 3
            name:
              type: string
              example: Dagligvarer
            category_id:
              type: integer
              example: 1
            is_default:
              type: boolean
              default: true

    SubCategoryUpdatedEvent:
      allOf:
        - $ref: "#/components/schemas/SubCategoryCreatedEvent"

    SubCategoryDeletedEvent:
      allOf:
        - $ref: "#/components/schemas/SubCategoryCreatedEvent"

    TransactionCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - transaction_id
            - account_id
            - user_id
            - amount
            - transaction_type
            - tx_date
          properties:
            transaction_id:
              type: integer
              example: 501
            account_id:
              type: integer
              example: 1001
            user_id:
              type: integer
              example: 42
            amount:
              type: string
              example: "-125.50"
              description: Decimal amount serialized as string to preserve precision.
            transaction_type:
              type: string
              example: expense
            tx_date:
              type: string
              format: date
              example: "2026-06-17"
            category_id:
              type:
                - integer
                - "null"
              example: 10
            category:
              type: string
              example: Groceries
            description:
              type: string
              example: Netto
            account_name:
              type: string
              example: Main account

    TransactionUpdatedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - transaction_id
            - account_id
            - user_id
            - amount
            - previous_amount
            - transaction_type
            - tx_date
          properties:
            transaction_id:
              type: integer
              example: 501
            account_id:
              type: integer
              example: 1001
            user_id:
              type: integer
              example: 42
            amount:
              type: string
              example: "-135.00"
            previous_amount:
              type: string
              example: "-125.50"
            transaction_type:
              type: string
              example: expense
            tx_date:
              type: string
              format: date
              example: "2026-06-17"
            category:
              type: string
              example: Food
            previous_category:
              type: string
              example: Groceries
            description:
              type: string
              example: Netto corrected

    TransactionDeletedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - transaction_id
            - account_id
            - user_id
            - amount
          properties:
            transaction_id:
              type: integer
              example: 501
            account_id:
              type: integer
              example: 1001
            user_id:
              type: integer
              example: 42
            amount:
              type: string
              example: "-125.50"

    TransactionCategorizedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - transaction_id
            - category_id
            - subcategory_id
          properties:
            transaction_id:
              type: integer
              example: 501
            category_id:
              type: integer
              example: 10
            category_name:
              type: string
              description: Parent-level name (v2; empty on v1 payloads).
              example: Mad & drikke
            subcategory_id:
              type: integer
              example: 101
            subcategory_name:
              type: string
              example: Supermarket
            merchant_id:
              type:
                - integer
                - "null"
              example: 77
            tier:
              type: string
              example: rules
            confidence:
              type: string
              example: "0.95"
            model_version:
              type: string
              example: rules-keyword-v1

    BudgetMonthClosedEvent:
      allOf:
        - $ref: "#/components/schemas/BaseEvent"
        - type: object
          required:
            - account_id
            - year
            - month
            - budgeted_amount
            - actual_spent
            - surplus_amount
