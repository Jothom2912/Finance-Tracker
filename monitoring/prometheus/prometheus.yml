global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Application availability monitoring.
  # This probes existing /health endpoints, so no backend code changes are required.
  - job_name: finance-http-health
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://user-service:8001/health
          - http://transaction-service:8002/health
          - http://account-service:8003/health
          - http://budget-service:8003/health
          - http://categorization-service:8005/health
          - http://goal-service:8006/health
          - http://ai-service:8004/health
          - http://banking-service:8009/health
          - http://gateway-service:8010/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Infrastructure availability monitoring.
  - job_name: finance-tcp-health
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
          - postgres-transactions:5432
          - postgres-categorization:5432
          - postgres-budget:5432
          - postgres-goals:5432
          - postgres-account:5432
          - postgres-banking:5432
          - redis:6379
          - rabbitmq:5672
          - ollama:11434
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
